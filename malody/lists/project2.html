<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Program 2 - Word List</title>
  <style>
    body { background: #1e1e2e; color: #cdd6f4; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; }
    h1 { color: #89b4fa; margin-bottom: 4px; }
    .subtitle { color: #6c7086; margin-bottom: 30px; font-size: 14px; }
    .controls { background: #313244; border-radius: 8px; padding: 16px 24px; margin-bottom: 24px; font-size: 14px; color: #a6e3a1; line-height: 2; }
    .controls span { color: #f38ba8; font-weight: bold; }
    #output { background: #181825; border: 1px solid #45475a; border-radius: 8px; padding: 24px; min-width: 400px; min-height: 160px; font-size: 18px; }
    .label { color: #6c7086; font-size: 13px; margin-bottom: 12px; }
    .word { color: #cba6f7; display: block; padding: 4px 0; }
    .flash { animation: flash 0.3s ease; }
    @keyframes flash { 0%,100%{background:#181825} 50%{background:#313244} }
  </style>
</head>
<body>
  <h1>Program 2</h1>
  <div class="subtitle">Word List</div>
  <div class="controls">
    Press <span>A</span> — Add "before" to the beginning of the list<br>
    Press <span>B</span> — Add "after" to the end of the list<br>
    Press <span>Up Arrow</span> — Change the center word to "middle"<br>
    Press <span>Down Arrow</span> — Print the list vertically
  </div>
  <div id="output">
    <div class="label">List contents will appear here after pressing Down Arrow...</div>
  </div>

  <script>
    // Create a list that has three words in it
    let words = ["hello", "world", "goodbye"];

    document.addEventListener("keydown", function(event) {
      // Prevent arrow keys from scrolling the page
      if (["ArrowUp", "ArrowDown"].includes(event.key)) {
        event.preventDefault();
      }

      const key = event.key.toLowerCase();
      const out = document.getElementById("output");

      // Press A: add "before" to the beginning
      if (key === "a") {
        words.unshift("before");
        out.innerHTML = `<div class="label">Added "before" to the beginning. List now has ${words.length} items.</div>`;
      }

      // Press B: add "after" to the end
      else if (key === "b") {
        words.push("after");
        out.innerHTML = `<div class="label">Added "after" to the end. List now has ${words.length} items.</div>`;
      }

      // Press Up: change the center word to "middle"
      else if (event.key === "ArrowUp") {
        let centerIndex = Math.floor(words.length / 2);
        words[centerIndex] = "middle";
        out.innerHTML = `<div class="label">Changed center word (index ${centerIndex}) to "middle".</div>`;
      }

      // Press Down: print the list vertically
      else if (event.key === "ArrowDown") {
        let html = `<div class="label">List (${words.length} items) — printed vertically:</div>`;
        for (let i = 0; i < words.length; i++) {
          html += `<span class="word">[${i}]  ${words[i]}</span>`;
        }
        out.innerHTML = html;
      }

      out.classList.remove("flash");
      void out.offsetWidth;
      out.classList.add("flash");
    });
  </script>
</body>
</html>
